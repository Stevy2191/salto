<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salto</title>
    <script>
      // Apply the theme before first paint so a dark-mode user never sees a
      // white flash. Mirrors src/lib/theme.ts — keep the two in sync.
      try {
        var saved = localStorage.getItem('salto-theme')
        var dark =
          saved === 'dark' ||
          (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', dark)
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
      } catch (e) {
        // Storage blocked — fall through to light.
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
