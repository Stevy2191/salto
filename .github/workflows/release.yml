# Builds and publishes the Docker image to GHCR, gated on the test suite.
#
# - Every push to main publishes ghcr.io/stevy2191/salto:latest — the image
#   users pull with `docker compose pull`.
# - Pushing a version tag (v1.2.3) additionally publishes :1.2.3 (and moves
#   :latest).
#
# One-time manual step after the first publish: make the package public in
# GitHub → Packages → salto → Package settings → Change visibility, so users
# can pull without authentication.
name: Publish image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

  # Happy-path check of the end-user installer: files land in the install
  # dir, the stack comes up healthy, and uninstall removes it again.
  install-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the image under the public tag
        run: docker build -t ghcr.io/stevy2191/salto:latest .

      - name: Install, verify, uninstall
        run: |
          mkdir -p /tmp/salto-install && cd /tmp/salto-install
          SALTO_REPO_RAW="file://$GITHUB_WORKSPACE" SALTO_PORT=3999 \
            bash "$GITHUB_WORKSPACE/install.sh"
          for f in install.sh uninstall.sh docker-compose.yml .env MANAGE.md; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          test -x install.sh && test -x uninstall.sh
          curl -fsS --retry 15 --retry-delay 1 --retry-all-errors \
            http://localhost:3999/api/health | grep -q '"ok"'
          # Re-run must keep the secret and stay healthy (repair mode).
          secret_before=$(sed -n 's/^SESSION_SECRET=//p' .env)
          SALTO_REPO_RAW="file://$GITHUB_WORKSPACE" SALTO_PORT=3999 bash install.sh
          [ "$(sed -n 's/^SESSION_SECRET=//p' .env)" = "$secret_before" ]
          curl -fsS http://localhost:3999/api/health | grep -q '"ok"'
          SALTO_DELETE_DATA=yes bash uninstall.sh
          if docker volume inspect salto-data >/dev/null 2>&1; then
            echo "volume should be gone"; exit 1
          fi

  build-and-push:
    needs: [test, install-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stevy2191/salto
          # On main pushes only `latest` applies; on v* tags the semver tag
          # is added as well.
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
