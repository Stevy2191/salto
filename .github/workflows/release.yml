# Builds and publishes the Docker image to GHCR, gated on the test suite.
#
# - Every push to main publishes ghcr.io/stevy2191/salto:latest — the image
#   users pull with `docker compose pull`.
# - Pushing a version tag (v1.2.3) additionally publishes :1.2.3 (and moves
#   :latest).
#
# One-time manual step after the first publish: make the package public in
# GitHub → Packages → salto → Package settings → Change visibility, so users
# can pull without authentication.
name: Publish image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stevy2191/salto
          # On main pushes only `latest` applies; on v* tags the semver tag
          # is added as well.
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
